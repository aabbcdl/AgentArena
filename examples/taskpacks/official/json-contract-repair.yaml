schemaVersion: agentarena.taskpack/v1
id: official-json-contract-repair
title: Official JSON Contract Repair
description: Repairs a JSON API contract using schema and value assertions.
metadata:
  source: official
  owner: AgentArena
  difficulty: medium
  objective: Validate an agent's ability to repair structured JSON output under explicit contract checks.
  repoTypes:
    - api
    - backend
    - node
  tags:
    - json
    - api
    - contract
  dependencies: []
  judgeRationale: Combined schema and pointer checks capture both payload shape and business-critical values.
  differentiator: Tests API contract understanding - weak agents may satisfy schema but miss business rules.
  i18n:
    zh-CN:
      title: JSON 契约修复
      description: 使用 schema 和值断言修复 JSON API 契约。
      objective: 验证 Agent 在显式契约检查下修复结构化 JSON 输出的能力。
      judgeRationale: 组合 schema 和指针检查同时捕获载荷结构和业务关键值。
      differentiator: 测试 API 契约理解——弱 Agent 可能满足 schema 但遗漏业务规则。
prompt: |
  ## Task | 任务
  
  The API response in `fixtures/response.json` violates its contract. Fix it:
  
  1. Read the schema at `fixtures/response.schema.json`
  2. Read the expected values specification
  3. Modify `fixtures/response.json` to satisfy BOTH:
     - The JSON schema (structure)
     - The expected values (business rules)
  
  ## Contract Requirements | 契约要求
  
  The response must:
  - Match the JSON schema exactly
  - Have `status` field set to "ready"
  - Preserve all valid existing data
  - Not contain extra undocumented fields
  
  ## Context | 上下文
  
  This is an API response that clients depend on. Breaking the contract will cause integration failures.
expectedChangedPaths:
  - fixtures/response.json
judges:
  - id: payload-schema
    type: json-schema
    label: Payload matches schema
    path: fixtures/response.json
    schemaPath: fixtures/response.schema.json
  - id: payload-status
    type: json-value
    label: Payload status stays ready
    path: fixtures/response.json
    pointer: /status
    expected: ready
  - id: payload-valid
    type: command
    label: Response is valid JSON
    command: node -e "const r = require('./fixtures/response.json'); console.log('Valid JSON')"
    timeoutMs: 5000
