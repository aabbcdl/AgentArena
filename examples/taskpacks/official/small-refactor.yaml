schemaVersion: repoarena.taskpack/v1
id: official-small-refactor
title: Official Small Refactor
description: Performs a low-risk refactor while keeping core repository structure intact.
metadata:
  source: official
  owner: RepoArena
  difficulty: medium
  objective: Measure whether an agent can apply a constrained refactor without destabilizing the codebase.
  repoTypes:
    - generic
    - node
  tags:
    - refactor
    - maintainability
  dependencies: []
  judgeRationale: File-presence, source-tree, and manifest checks help detect accidental damage during small refactors.
  differentiator: Tests refactoring discipline - weak agents may break behavior or introduce bugs during refactoring.
  i18n:
    zh-CN:
      title: 小型重构
      description: 执行低风险重构，同时保持核心仓库结构完整。
      objective: 衡量 Agent 能否在不破坏代码库的前提下进行受限重构。
      judgeRationale: 文件存在性、源码树和清单检查有助于检测小型重构中的意外损坏。
      differentiator: 测试重构纪律——弱 Agent 可能在重构过程中破坏行为或引入 bug。
prompt: |
  ## Task | 任务
  
  Perform a small maintainability-focused refactor. Choose ONE of the following:
  
  1. **Extract a repeated code pattern** into a reusable function
  2. **Rename unclear variable/function names** to more descriptive ones
  3. **Simplify a complex conditional** logic
  4. **Add missing type annotations** (if TypeScript)
  
  ## Requirements | 要求
  
  - The refactor must NOT change any external behavior
  - All existing tests must still pass (if any)
  - The refactor should improve code readability or maintainability
  - Do NOT add new features
  - Do NOT delete existing functionality
  
  ## Verification | 验证
  
  Before submitting, verify:
  - Code still compiles/runs
  - Tests still pass (if any)
  - No new lint errors introduced
expectedChangedPaths:
  - src/**/*.{js,mjs,ts,tsx}
  - packages/**/src/**/*.{js,mjs,ts,tsx}
  - lib/**/*.{js,mjs,ts,tsx}
judges:
  - id: source-tree-present
    type: glob
    label: Source tree still exists
    pattern: packages/**/src/*.ts
    minMatches: 1
  - id: readme-exists
    type: file-exists
    label: README still exists
    path: README.md
  - id: no-package-changes
    type: command
    label: package.json dependencies unchanged
    command: node -e "const {execFileSync}=require('node:child_process');const diff=execFileSync('git',['diff','--','package.json'],{encoding:'utf8'});if(/^[+-].*dependencies/m.test(diff)){console.error(diff);process.exit(1)}"
    timeoutMs: 10000
