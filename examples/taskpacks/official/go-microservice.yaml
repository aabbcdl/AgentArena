schemaVersion: agentarena.taskpack/v1
id: go-microservice
title: Go Microservice Feature
description: Add a feature to a Go microservice with proper error handling and tests.
metadata:
  i18n:
    zh-CN:
      title: "Go 微服务功能"
      description: "为 Go 微服务添加新功能"
  source: official
  owner: AgentArena
  difficulty: medium
  objective: Implement a new handler or middleware in a Go microservice
  judgeRationale: Go compilation and test passage ensure correctness
  repoTypes: ["go", "microservice", "api"]
  tags: ["go", "golang", "microservice", "backend"]
  dependencies: ["go"]
prompt: |
  Add a new feature to this Go microservice.

  Requirements:
  1. Follow existing code patterns (handler structure, error handling)
  2. Add proper error handling with meaningful error messages
  3. Write tests for the new functionality
  4. All existing tests must pass
  5. Code must compile without errors

  Check the existing handlers for the pattern to follow.
envAllowList: []
setupCommands: []
judges:
  - id: compiles
    type: compilation
    label: Go build succeeds
    tool: go
    timeoutMs: 120000
    critical: true
  - id: tests-pass
    type: test-result
    label: All tests pass
    command: go test ./... -json
    timeoutMs: 120000
    critical: true
teardownCommands: []
