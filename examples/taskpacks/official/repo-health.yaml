schemaVersion: repoarena.taskpack/v1
id: official-repo-health
title: Official Repo Health
description: Validates baseline repository health after a minimal improvement task.
metadata:
  source: official
  owner: RepoArena
  difficulty: easy
  objective: Check that an agent can make a small useful change without damaging repository structure.
  repoTypes:
    - generic
    - node
  tags:
    - repo-health
    - maintenance
  dependencies: []
  judgeRationale: Basic file and manifest checks catch the most common accidental breakages.
  differentiator: Baseline test - all competent agents should pass. Failure indicates basic capability issues.
  i18n:
    zh-CN:
      title: 仓库健康检查
      description: 在最小改进任务后验证仓库基线健康状态。
      objective: 检查 Agent 是否能做一个小的有用改动，同时不破坏仓库结构。
      judgeRationale: 基础文件和清单检查能捕获最常见的意外破坏。
      differentiator: 基线测试——所有合格 Agent 都应通过。失败说明基础能力有问题。
prompt: |
  ## Task | 任务
  
  Inspect the repository and make ONE small useful improvement. Your improvement should:
  
  1. Be genuinely useful (not just adding comments or whitespace)
  2. Not break any existing functionality
  3. Not remove any existing files
  4. Follow the project's existing code style
  
  Examples of useful improvements:
  - Add a missing error handler
  - Fix a typo in documentation
  - Add a helpful utility function
  - Improve a confusing variable name
  
  ## Constraints | 约束
  
  - Do NOT delete any existing files
  - Do NOT modify package.json dependencies
  - Do NOT add new dependencies
  - Preserve all existing file structure
judges:
  - id: readme-exists
    type: file-exists
    label: README exists
    path: README.md
  - id: package-manifest-exists
    type: file-exists
    label: Package manifest exists
    path: package.json
  - id: src-files-preserved
    type: glob
    label: Source files still exist
    pattern: "**/*.{js,ts,mjs}"
    minMatches: 1