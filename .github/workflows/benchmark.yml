name: Benchmark

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]
  schedule:
    - cron: "0 2 * * 1"  # Weekly on Monday at 2 AM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  benchmark-demo:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run benchmark
        run: node packages/cli/dist/index.js run --repo . --task examples/taskpacks/official/repo-health.yaml --agents demo-fast,demo-thorough
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .agentarena/runs/
