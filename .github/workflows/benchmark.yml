name: Benchmark

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]
  schedule:
    - cron: "0 2 * * 1"  # Weekly on Monday at 2 AM UTC

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  benchmark-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run benchmark
        run: node packages/cli/dist/index.js run --repo . --task examples/taskpacks/official/repo-health.yaml --agents demo-fast,demo-thorough
      - uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: .agentarena/runs/
